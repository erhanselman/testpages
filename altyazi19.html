<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Video.js + TTS + Kelime Altyazı</title>
<link href="https://vjs.zencdn.net/7.22.1/video-js.css" rel="stylesheet" />
<style>
  body { font-family: Arial; text-align: center; background: #111; color: white; }
  .video-js { width: 70%; margin: 20px auto; }
  #subtitle { font-size: 20px; margin-top: 10px; min-height: 30px; }
  .highlight { color: yellow; font-weight: bold; }
  button { margin: 10px; padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<h2>🎬 Video.js + TTS + Kelime Altyazı</h2>

<video
  id="my-video"
  class="video-js"
  controls
  preload="auto"
  width="640"
  height="360"
  data-setup='{}'>
  <source src="video.mp4" type="video/mp4">
</video>

<div id="subtitle"></div>
<button onclick="playWithTTS()">▶️ Oynat + Dublaj</button>

<script src="https://vjs.zencdn.net/7.22.1/video.min.js"></script>
<script>
const player = videojs('my-video');
const subtitleEl = document.getElementById('subtitle');

// Örnek altyazı (zaman ve metin)
const subtitles = [
  { start: 0, end: 2, text: "Merhaba dünya" },
  { start: 2, end: 4, text: "Video.js ile TTS ve altyazı" },
  { start: 4, end: 6, text: "Her kelime vurgulanacak" }
];

// Kelime kelime highlight fonksiyonu
function highlightText(text) {
  const words = text.split(' ');
  let index = 0;
  subtitleEl.innerHTML = '';
  const interval = setInterval(() => {
    subtitleEl.innerHTML = words.map((w,i)=> i===index? `<span class="highlight">${w}</span>`:w).join(' ');
    index++;
    if(index > words.length) clearInterval(interval);
  }, 400); // 400ms her kelime için
}

// TTS oynatma fonksiyonu
function speak(text) {
  return new Promise(resolve => {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'tr-TR';
    utterance.onend = resolve;
    speechSynthesis.speak(utterance);
  });
}

// Video + TTS + Altyazı senkron
async function playWithTTS() {
  player.currentTime(0);
  player.play();
  for (const sub of subtitles) {
    await new Promise(r => setTimeout(r, sub.start * 1000));
    highlightText(sub.text);
    await speak(sub.text);
  }
}
</script>
</body>
</html>
