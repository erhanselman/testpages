<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Text → Video</title>

    <!-- gtts-js kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/gtts-js@latest/dist/gtts.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 300px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Metni Sese Çevir</h2>

    <input type="text" id="metin" placeholder="Bir şey yaz...">
    <button onclick="konustur()">Oku</button>

    <script>
        function konustur() {
            const text = document.getElementById("metin").value;

            if (!text) {
                alert("Lütfen bir metin gir!");
                return;
            }

            const gtts = new GTTS(text, "tr");
            gtts.play();
        }
    </script>

</body>
</html>
