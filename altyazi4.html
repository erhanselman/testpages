<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Text → Video</title>

<script src="https://cdn.jsdelivr.net/npm/gtts-js@latest/dist/gtts.min.js"></script>


<script>
window.onload = function () {
  const gtts = new window.gTTS("Merhaba, test videosu", "tr");
  gtts.save("testspeech.mp3")
    .then(() => console.log("MP3 oluşturuldu"))
    .catch(err => console.error(err));
};
</script>

</head>
